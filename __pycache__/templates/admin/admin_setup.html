<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>TicketHub Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="admin-topbar">
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;height:64px;">
    <span class="admin-nav-logo">🎟 Ticket<span>Hub</span></span>
    <a href="/admin/dashboard" class="btn-outline" style="color:#fff;border-color:rgba(255,255,255,0.3);padding:7px 14px;font-size:13px;">← Dashboard</a>
  </div>
</div>
<div style="background:var(--cream);min-height:calc(100vh - 64px);padding:40px 0;">
<div class="container">
  <div style="max-width:600px;margin:0 auto;">
    <div class="card card-body">
      <div style="text-align:center;margin-bottom:24px;">
        <span style="font-size:3rem;">⚙️</span>
        <h2 class="font-serif" style="color:var(--navy);margin-top:8px;">Admin Setup</h2>
        <p style="color:var(--text-muted);font-size:13px;">Create or reset the admin account</p>
      </div>
      <div class="alert alert-warning" style="margin-bottom:20px;"><i class="bi bi-exclamation-triangle"></i> One-time setup. After creating admin, login at <a href="/login" class="auth-link">/login</a>.</div>
      {% if message %}
      <div class="alert alert-{{ message[0] }}"><i class="bi bi-info-circle"></i> {{ message[1] }}</div>
      {% if message[0] == 'success' %}
      <div style="text-align:center;margin-bottom:16px;"><a href="/login" class="btn-primary"><i class="bi bi-box-arrow-in-right"></i> Go to Login</a></div>
      {% endif %}{% endif %}
      <form method="POST" action="/admin/setup">
        <div class="form-group"><label class="form-label">Admin Name</label><input type="text" name="name" class="form-control" placeholder="Super Admin" value="Admin"></div>
        <div class="form-group"><label class="form-label">Admin Email</label><input type="email" name="email" class="form-control" placeholder="admin@tickethub.com" required></div>
        <div class="form-group" style="margin-bottom:24px;"><label class="form-label">Password</label><input type="password" name="password" class="form-control" placeholder="Choose a strong password" required></div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:13px;"><i class="bi bi-shield-lock"></i> Create / Reset Admin</button>
      </form>
    </div>
  </div>
</div>
</div>
</body>
</html>
